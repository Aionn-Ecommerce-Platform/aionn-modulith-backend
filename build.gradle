plugins {
    id 'java'
    id 'jacoco'
    id 'org.springframework.boot' version '3.5.14' apply false
    id 'io.spring.dependency-management' version '1.1.7' apply false
    id 'org.sonarqube' version '7.3.1.8318'
}

jacoco {
    toolVersion = '0.8.13'
}

allprojects {
    group = 'com.aionn'
    version = '0.1.0-SNAPSHOT'
}

subprojects {
    apply plugin: 'java-library'
    apply plugin: 'jacoco'
    apply plugin: 'io.spring.dependency-management'

    dependencyManagement {
        imports {
            mavenBom org.springframework.boot.gradle.plugin.SpringBootPlugin.BOM_COORDINATES
            mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
        }
    }

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(javaVersion)
        }
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.compilerArgs << '-parameters'
    }

    tasks.withType(Test).configureEach {
        useJUnitPlatform()
        systemProperty 'file.encoding', 'UTF-8'
        finalizedBy tasks.named('jacocoTestReport')
    }

    tasks.withType(Javadoc).configureEach {
        options.encoding = 'UTF-8'
    }

    tasks.named('jacocoTestReport') {
        dependsOn tasks.named('test')
        reports {
            xml.required = true
            html.required = true
        }
    }

    dependencies {
        compileOnly 'org.projectlombok:lombok'
        annotationProcessor 'org.projectlombok:lombok'
        testCompileOnly 'org.projectlombok:lombok'
        testAnnotationProcessor 'org.projectlombok:lombok'
        testImplementation 'org.junit.jupiter:junit-jupiter'
    }
}

sonar {
    properties {
        property 'sonar.projectKey', 'Aionn-Ecommerce-Platform_aionn-modulith-backend'
        property 'sonar.organization', 'aionn-ecommerce-platform'
        property 'sonar.host.url', 'https://sonarcloud.io'
        property 'sonar.coverage.jacoco.xmlReportPaths',
                subprojects.collect {
                    "${it.layout.buildDirectory.get().asFile.path}/reports/jacoco/test/jacocoTestReport.xml"
                }.join(',')
        property 'sonar.coverage.exclusions', [
                '**/application/dto/**',
                '**/application/mapper/**',
                '**/application/port/**',
                '**/application/usecase/**',
                '**/application/policy/AccountManagementPolicy.java',
                '**/application/policy/AddressPolicy.java',
                '**/application/policy/AgentPolicy.java',
                '**/application/policy/AuthPolicy.java',
                '**/application/policy/IdentityValidationConstants.java',
                '**/application/policy/KycPolicy.java',
                '**/application/policy/MfaPolicy.java',
                '**/application/policy/RegistrationPolicy.java',
                '**/application/policy/Spring*.java',
                '**/adapter/rest/dto/**',
                '**/adapter/rest/mapper/**',
                '**/adapter/rest/support/**',
                '**/adapter/rest/exception/**',
                '**/adapter/rest/config/**',
                '**/domain/event/**',
                '**/domain/valueobject/**',
                '**/infrastructure/config/**',
                '**/infrastructure/persistence/entity/**',
                '**/infrastructure/persistence/mapper/**',
                '**/infrastructure/persistence/repository/**',
                '**/infrastructure/persistence/adapter/**',
                '**/infrastructure/observability/**',
                '**/infrastructure/integration/**',
                '**/infrastructure/gateway/**',
                '**/infrastructure/scheduling/**',
                '**/infrastructure/listener/**',
                '**/infrastructure/search/OpenSearchProductSearchIndex.java',
                '**/infrastructure/search/OpenSearchConfig.java'
        ].join(',')
    }
}
