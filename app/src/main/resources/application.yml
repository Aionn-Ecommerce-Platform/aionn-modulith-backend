server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ${APP_NAME:aionn-modulith-backend}

  config:
    import:
      - classpath:application-identity.yml
      - classpath:application-catalog.yml

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_LOCAL_PORT:5432}/${POSTGRES_DB:aionn}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_LOCAL_PORT:6379}
      password: ${REDIS_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${SPRING_JPA_FORMAT_SQL:false}

  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db
    out-of-order: true

  mail:
    host: ${SPRING_MAIL_HOST:${DEV_MAIL_HOST:smtp.gmail.com}}
    port: ${SPRING_MAIL_PORT:${DEV_MAIL_PORT:587}}
    username: ${SPRING_MAIL_USERNAME:${DEV_MAIL_USERNAME:}}
    password: ${SPRING_MAIL_PASSWORD:${DEV_MAIL_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  upload-base-url: ${CLOUDINARY_UPLOAD_BASE_URL:https://api.cloudinary.com/v1_1}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    "[com.aionn]": ${LOG_LEVEL:INFO}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
